name: Manual Deploy
on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy target"
        required: true
      version:
        description: "Version to deploy"
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy
        run: |
          echo "Deploying ${{ inputs.version }} to ${{ inputs.environment }}"
