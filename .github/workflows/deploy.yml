name: Deploy
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: npm install
      - name: Build
        run: npm run build
      - name: Deploy
        run: npm publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
